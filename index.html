<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书热点采集分析工具 | RedNote Trends</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📕</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="logo">📕</span>
                <h1>RedNote Trends</h1>
                <span class="subtitle">小红书热点采集分析工具</span>
            </div>
            <div class="header-right">
                <button class="btn btn-refresh" onclick="app.refreshAll()">
                    <span class="icon">🔄</span> 刷新数据
                </button>
                <button class="btn btn-export" onclick="app.exportData()">
                    <span class="icon">📊</span> 导出报告
                </button>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-info">
                    <div class="stat-value" id="totalPosts">--</div>
                    <div class="stat-label">热门笔记</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💬</div>
                <div class="stat-info">
                    <div class="stat-value" id="totalComments">--</div>
                    <div class="stat-label">评论总数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">❤️</div>
                <div class="stat-info">
                    <div class="stat-value" id="totalLikes">--</div>
                    <div class="stat-label">总点赞</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <div class="stat-value" id="trendingTopics">--</div>
                    <div class="stat-label">热门话题</div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left: Category Analysis -->
            <div class="panel category-panel">
                <h2 class="panel-title">📊 热门类别分布</h2>
                <div class="category-chart" id="categoryChart"></div>
                <div class="category-list" id="categoryList"></div>
            </div>

            <!-- Right: Trending Posts -->
            <div class="panel posts-panel">
                <div class="panel-header">
                    <h2 class="panel-title">🔥 实时热门笔记</h2>
                    <div class="filter-tabs">
                        <button class="tab active" onclick="app.filterPosts('all', this)">全部</button>
                        <button class="tab" onclick="app.filterPosts('beauty', this)">美妆</button>
                        <button class="tab" onclick="app.filterPosts('food', this)">美食</button>
                        <button class="tab" onclick="app.filterPosts('travel', this)">旅行</button>
                        <button class="tab" onclick="app.filterPosts('fashion', this)">穿搭</button>
                        <button class="tab" onclick="app.filterPosts('lifestyle', this)">生活</button>
                        <button class="tab" onclick="app.filterPosts('tech', this)">数码</button>
                    </div>
                </div>
                <div class="posts-list" id="postsList"></div>
            </div>
        </div>

        <!-- Bottom Section -->
        <div class="bottom-section">
            <!-- Trending Keywords -->
            <div class="panel keywords-panel">
                <h2 class="panel-title">🏷️ 热门关键词云</h2>
                <div class="keyword-cloud" id="keywordCloud"></div>
            </div>

            <!-- Comment Analysis -->
            <div class="panel comments-panel">
                <h2 class="panel-title">💬 热门评论分析</h2>
                <div class="sentiment-bar">
                    <div class="sentiment positive" id="sentimentPositive"></div>
                    <div class="sentiment neutral" id="sentimentNeutral"></div>
                    <div class="sentiment negative" id="sentimentNegative"></div>
                </div>
                <div class="sentiment-labels">
                    <span class="label positive">😊 正面 <span id="posPercent"></span></span>
                    <span class="label neutral">😐 中性 <span id="neuPercent"></span></span>
                    <span class="label negative">😞 负面 <span id="negPercent"></span></span>
                </div>
                <div class="hot-comments" id="hotComments"></div>
            </div>

            <!-- Time Trend -->
            <div class="panel trend-panel">
                <h2 class="panel-title">📈 24小时热度趋势</h2>
                <div class="trend-chart" id="trendChart"></div>
            </div>
        </div>

        <!-- Post Detail Modal -->
        <div class="modal" id="postModal">
            <div class="modal-content">
                <button class="modal-close" onclick="app.closeModal()">✕</button>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
