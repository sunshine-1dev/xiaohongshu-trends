<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>小红书热点趋势 | XHS Trends</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📕</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">📕</span>
                <h1>小红书热点趋势</h1>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索小红书热门话题..." autocomplete="off">
                    <button id="searchBtn" class="search-btn" title="搜索">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>
                <button id="themeToggle" class="theme-toggle" title="切换主题">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stats-inner">
            <span class="stat-item">
                <span class="stat-dot hot"></span>
                <span id="feedCount">加载中...</span> 条热门内容
            </span>
            <span class="stat-divider">|</span>
            <span class="stat-item">
                <span class="stat-dot"></span>
                更新于 <span id="lastUpdated">-</span>
            </span>
            <span class="stat-divider">|</span>
            <span class="stat-item filter-group">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="normal">📷 图文</button>
                <button class="filter-btn" data-filter="video">🎬 视频</button>
            </span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <div class="waterfall" id="waterfall">
            <!-- Cards injected by JS -->
        </div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>加载热门内容中...</p>
        </div>
        <div class="empty" id="empty" style="display:none">
            <div class="empty-icon">🔍</div>
            <p>没有找到匹配的内容</p>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M18 6 6 18M6 6l12 12"></path>
                </svg>
            </button>
            <div class="modal-body" id="modalBody">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>数据来源：<a href="https://www.xiaohongshu.com/explore" target="_blank" rel="noopener">小红书探索页</a> · 仅供学习研究使用</p>
        <p class="footer-sub">Built with ❤️ by <a href="https://github.com/sunshine-1dev" target="_blank" rel="noopener">sunshine-1dev</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
