<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书热点趋势 | XHS Trends</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📕</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #f5f5f5;
            --card-bg: #fff;
            --text: #333;
            --text-light: #666;
            --border: #eee;
            --primary: #ff2442;
            --primary-light: #fff0f0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        
        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --text: #e0e0e0;
            --text-light: #999;
            --border: #333;
            --primary-light: #3a1a1a;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: var(--primary);
            color: white;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(255,36,66,0.3);
        }
        
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .logo-icon { font-size: 28px; }
        .logo h1 { font-size: 20px; font-weight: 700; white-space: nowrap; }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            max-width: 500px;
        }
        
        .search-box {
            flex: 1;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 36px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input::placeholder { color: rgba(255,255,255,0.7); }
        .search-box input:focus { background: rgba(255,255,255,0.3); }
        
        .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: rgba(255,255,255,0.7);
        }
        
        .theme-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        .theme-btn:hover { background: rgba(255,255,255,0.3); }
        
        /* Stats bar */
        .stats-bar {
            max-width: 1200px;
            margin: 20px auto 0;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .stats-info {
            font-size: 13px;
            color: var(--text-light);
        }
        
        .stats-info strong { color: var(--primary); }
        
        .filter-tabs {
            display: flex;
            gap: 8px;
        }
        
        .filter-tab {
            padding: 6px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-light);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-tab.active, .filter-tab:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Masonry Grid */
        .grid {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            columns: 5;
            column-gap: 16px;
        }
        
        @media (max-width: 1100px) { .grid { columns: 4; } }
        @media (max-width: 860px) { .grid { columns: 3; } }
        @media (max-width: 600px) { .grid { columns: 2; column-gap: 10px; } }
        
        /* Card */
        .card {
            break-inside: avoid;
            margin-bottom: 16px;
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .card-cover {
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        .card-cover img {
            width: 100%;
            display: block;
            transition: transform 0.4s;
        }
        
        .card:hover .card-cover img { transform: scale(1.05); }
        
        .card-type {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            backdrop-filter: blur(4px);
        }
        
        .card-body { padding: 12px; }
        
        .card-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-author {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }
        
        .card-author img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .card-author span {
            font-size: 12px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-likes {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-light);
            flex-shrink: 0;
        }
        
        .card-likes svg {
            width: 14px;
            height: 14px;
            fill: var(--primary);
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--card-bg);
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal-cover {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 16px 16px 0 0;
        }
        
        .modal-body { padding: 20px; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; line-height: 1.4; }
        
        .modal-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .modal-author img { width: 36px; height: 36px; border-radius: 50%; }
        .modal-author-name { font-size: 15px; font-weight: 600; }
        
        .modal-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        
        .modal-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-light);
        }
        
        .modal-stat svg { width: 18px; height: 18px; }
        .modal-stat .heart { fill: var(--primary); }
        
        .modal-link {
            display: block;
            text-align: center;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 16px;
        }
        
        .modal-link:hover { background: #e61e3a; transform: scale(1.02); }
        
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        
        .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 13px;
        }
        
        .footer a { color: var(--primary); text-decoration: none; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Refresh button */
        .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
            color: white;
        }
        
        .refresh-btn:hover { background: rgba(255,255,255,0.3); transform: rotate(180deg); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">📕</span>
                <h1>小红书热点趋势</h1>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索帖子标题或作者..." autocomplete="off">
                </div>
                <button class="refresh-btn" id="refreshBtn" title="刷新数据">🔄</button>
                <button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stats-info" id="statsInfo">加载中...</div>
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">全部</button>
            <button class="filter-tab" data-filter="normal">📷 图文</button>
            <button class="filter-tab" data-filter="video">🎬 视频</button>
        </div>
    </div>

    <div class="grid" id="grid">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div>加载热门内容中...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <img class="modal-cover" id="modalCover" src="" alt="">
            <div class="modal-body">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-author">
                    <img id="modalAvatar" src="" alt="">
                    <div>
                        <div class="modal-author-name" id="modalAuthor"></div>
                    </div>
                </div>
                <div class="modal-stats">
                    <div class="modal-stat">
                        <svg viewBox="0 0 24 24"><path class="heart" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span id="modalLikes">0</span>
                    </div>
                    <div class="modal-stat" id="modalTypeLabel">
                        <span>📷 图文</span>
                    </div>
                </div>
                <a class="modal-link" id="modalLink" href="" target="_blank" rel="noopener">
                    📕 在小红书中查看完整内容和评论
                </a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>数据来源：小红书探索页 · 更新时间：<span id="updateTime">-</span></p>
        <p style="margin-top:8px">⚠️ 仅供学习研究使用，数据版权归小红书所有</p>
        <p style="margin-top:8px">Made with 🦞 by <a href="https://github.com/sunshine-1dev">sunshine-1dev</a></p>
    </footer>

    <script>
        let allFeeds = [];
        let currentFilter = 'all';

        // Load data
        async function loadData() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                allFeeds = data.feeds || [];
                document.getElementById('updateTime').textContent = data.lastUpdated || '-';
                renderCards(allFeeds);
            } catch (e) {
                document.getElementById('grid').innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">😢</div>
                        <p>数据加载失败，请稍后再试</p>
                    </div>`;
            }
        }

        function renderCards(feeds) {
            const filtered = currentFilter === 'all' ? feeds : feeds.filter(f => f.type === currentFilter);
            
            document.getElementById('statsInfo').innerHTML = 
                `共 <strong>${filtered.length}</strong> 条热门内容` + 
                (currentFilter !== 'all' ? ` · 筛选: ${currentFilter === 'video' ? '视频' : '图文'}` : '');

            if (!filtered.length) {
                document.getElementById('grid').innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🔍</div>
                        <p>没有找到匹配的内容</p>
                    </div>`;
                return;
            }

            document.getElementById('grid').innerHTML = filtered.map((feed, i) => `
                <div class="card" onclick="openModal(${i})" data-index="${i}">
                    <div class="card-cover">
                        <img src="${feed.coverUrl}" alt="${feed.title}" loading="lazy" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23ccc%22 font-size=%2240%22>📕</text></svg>'">
                        ${feed.type === 'video' ? '<span class="card-type">🎬 视频</span>' : ''}
                    </div>
                    <div class="card-body">
                        <div class="card-title">${feed.title || '无标题'}</div>
                        <div class="card-footer">
                            <div class="card-author">
                                <img src="${feed.avatar}" alt="" onerror="this.style.display='none'">
                                <span>${feed.nickname || '匿名用户'}</span>
                            </div>
                            <div class="card-likes">
                                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                ${feed.likedCount}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(index) {
            const filtered = currentFilter === 'all' ? allFeeds : allFeeds.filter(f => f.type === currentFilter);
            const feed = filtered[index];
            if (!feed) return;

            document.getElementById('modalCover').src = feed.coverUrl;
            document.getElementById('modalTitle').textContent = feed.title || '无标题';
            document.getElementById('modalAvatar').src = feed.avatar;
            document.getElementById('modalAuthor').textContent = feed.nickname || '匿名用户';
            document.getElementById('modalLikes').textContent = feed.likedCount || '0';
            document.getElementById('modalTypeLabel').innerHTML = 
                feed.type === 'video' ? '<span>🎬 视频</span>' : '<span>📷 图文</span>';
            document.getElementById('modalLink').href = feed.link;
            
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this || e.target.classList.contains('modal-close')) {
                this.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('modalOverlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', function() {
            const q = this.value.trim().toLowerCase();
            if (!q) {
                renderCards(allFeeds);
                return;
            }
            const filtered = allFeeds.filter(f => 
                (f.title || '').toLowerCase().includes(q) || 
                (f.nickname || '').toLowerCase().includes(q)
            );
            renderCards(filtered);
        });

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                const q = document.getElementById('searchInput').value.trim().toLowerCase();
                if (q) {
                    const filtered = allFeeds.filter(f => 
                        (f.title || '').toLowerCase().includes(q) || 
                        (f.nickname || '').toLowerCase().includes(q)
                    );
                    renderCards(filtered);
                } else {
                    renderCards(allFeeds);
                }
            });
        });

        // Theme toggle
        document.getElementById('themeBtn').addEventListener('click', function() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            this.textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        });

        // Restore theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        // Refresh - redirect to XHS search
        document.getElementById('refreshBtn').addEventListener('click', function() {
            window.open('https://www.xiaohongshu.com/explore', '_blank');
        });

        // Init
        loadData();
    </script>
</body>
</html>
